name: Bug report
description: Report a reproducible PatchGym problem.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0 or git commit SHA"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15, Ubuntu 24.04, ..."
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python --version"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Keep this minimal and do not include secrets or private code.
    validations:
      required: true
