name: Feature request
description: Suggest a focused improvement to PatchGym.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow affected
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Example or reproduction steps
    validations:
      required: true
